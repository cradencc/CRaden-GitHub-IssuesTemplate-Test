name: "Functional Requirement"
description: "Define a business requirement or functional specification for this client."
title: "[REQ] "
labels: ["functional-requirement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Functional Requirement
        Use this template to document a business requirement or functional specification. Provide enough detail for the development team to understand the desired outcome without ambiguity.

  - type: dropdown
    id: module-area
    attributes:
      label: "Module Area"
      description: "Which BC module does this requirement relate to?"
      options:
        - Finance / General Ledger
        - Accounts Payable
        - Accounts Receivable
        - Cash Management / Banking
        - Fixed Assets
        - Sales
        - Purchasing
        - Inventory
        - Warehouse Management
        - Manufacturing
        - Jobs / Projects
        - Service Management
        - Intercompany
        - Dimensions / Reporting
        - Integration / API
        - Security / Permissions
        - Other
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: "Target Environment"
      description: "Which environment is this requirement targeted at?"
      options:
        - Production
        - Sandbox
        - Development
        - All Environments
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      options:
        - Critical - Business Blocked
        - High - Significant Impact
        - Medium - Normal Priority
        - Low - Nice to Have
    validations:
      required: true

  - type: dropdown
    id: requirement-type
    attributes:
      label: "Requirement Type"
      description: "What kind of work does this requirement involve?"
      options:
        - New Functionality (AL Development)
        - Configuration Change (No Code)
        - Process Change / SOP Update
        - Report / Query
        - Integration
        - Data Migration / Correction
    validations:
      required: true

  - type: textarea
    id: business-process
    attributes:
      label: "Business Process Description"
      description: "Describe the business process or workflow this requirement supports. Who is involved? What triggers it?"
      placeholder: "Example: The AP team currently processes vendor invoices manually by keying them into BC one at a time. This process is triggered when invoices arrive via email..."
    validations:
      required: true

  - type: textarea
    id: current-state
    attributes:
      label: "Current State / Pain Point"
      description: "What is happening today? What is the problem or gap?"
    validations:
      required: true

  - type: textarea
    id: desired-outcome
    attributes:
      label: "Desired Outcome / Acceptance Criteria"
      description: "What does 'done' look like? Be specific about expected behavior, outputs, and success criteria."
    validations:
      required: true

  - type: textarea
    id: affected-users
    attributes:
      label: "Affected Users / Roles"
      description: "Which BC user roles or people are impacted by this requirement?"
      placeholder: "Example: AP Clerk, AP Manager, Controller"
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: "Dependencies / Related Issues"
      description: "Are there other issues, requirements, or external factors this depends on? Reference issue numbers with #."
    validations:
      required: false

  - type: textarea
    id: attachments
    attributes:
      label: "Supporting Documentation"
      description: "Attach screenshots, process flow diagrams, spreadsheets, or any reference material. Drag and drop files here."
    validations:
      required: false
