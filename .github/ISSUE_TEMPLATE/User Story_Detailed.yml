name: "User Story"
description: "Define an AL code development task tied to a functional requirement."
title: "[DEV]"
labels: ["al-development", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## AL Development Task
        Use this template to define a specific unit of work to be delivered for the client. for development task in AL. This should be linked to a Functional Requirement issue where possible.

  - type: input
    id: related-requirement
    attributes:
      label: "Related Functional Requirement"
      description: "Link the parent functional requirement issue (e.g., #12). If this task originated from a support request, link that instead."
      placeholder: "#"
    validations:
      required: false

  - type: textarea
    id: user-story
    attributes:
      label: "User Story"
      description: "Describe the user story that this development task addresses."
      placeholder: "As a [role], I want [feature] so that [benefit]."
    validations:
      required: false

  - type: dropdown
    id: dev-type
    attributes:
      label: "Development Type"
      options:
        - New Extension Object (Table, Page, Codeunit, Report, etc.)
        - Table Extension
        - Page Extension / Customization
        - Codeunit (Business Logic)
        - Report / Report Extension
        - XMLport
        - API Page / Web Service
        - Event Subscriber
        - Permission Set
        - Enum / Enum Extension
        - Bug Fix (Existing AL Code)
    validations:
      required: false

  - type: textarea
    id: dev-description
    attributes:
      label: "Development Description"
      description: "Describe what needs to be built or changed. Include functional context so the developer understands the 'why' behind the task."
    validations:
      required: false

  - type: input
    id: client-dev-environment-url
    attributes:
      label: "Client Dev Environment URL"
      description: "URL of the client's development environment"
      placeholder: "https://"
    validations:
      required: false

  - type: input
    id: client-uat-environment-url
    attributes:
      label: "Client UAT Environment URL"
      description: "URL of the client's UAT environment"
      placeholder: "https://"
    validations:
      required: false

  - type: input
    id: client-prod-environment-url
    attributes:
      label: "Client Production Environment URL"
      description: "URL of the client's production environment"
      placeholder: "https://"
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      options:
        - 0
        - 1
        - 2
        - 3
        - 4
        - 5
    validations:
      required: false

  - type: textarea
    id: technical-approach
    attributes:
      label: "Technical Approach (Optional)"
      description: "If a specific technical approach has been discussed or decided, document it here. Reference base objects, events, or patterns."
      placeholder: "Example: Subscribe to OnAfterPostSalesInvoice event in Codeunit 80 to trigger the integration call. Use HttpClient for the external API."
    validations:
      required: false

  - type: textarea
    id: objects-affected
    attributes:
      label: "BC Objects Affected"
      description: "List any known base or custom objects that will be extended or impacted."
      placeholder: |
        Example:
        - Table 36 (Sales Header) - Extension
        - Page 42 (Sales Order) - Page Extension
        - New Codeunit 50101 (Custom Integration Handler)
    validations:
      required: false

  - type: textarea
    id: testing-criteria
    attributes:
      label: "Testing Criteria"
      description: "How should the developer verify this works? Include specific test scenarios the functional consultant will validate."
    validations:
      required: false

  - type: input
    id: effort-estimate
    attributes:
      label: "Dev Estimate (Hours)"
      description: "Developer-provided estimate"
      placeholder: "0"
    validations:
      required: false

  # - type: dropdown
  #   id: branch-target
  #   attributes:
  #     label: "Target Branch"
  #     description: "Which branch should this be developed against?"
  #     options:
  #       - dev
  #       - staging (hotfix)
  #   validations:
  #     required: true

  - type: textarea
    id: attachments
    attributes:
      label: "Supporting Documentation"
      description: "Attach TDDs, emails, and other files related to this request throughout the SDLC. Drag and drop files here."
    validations:
      required: false
